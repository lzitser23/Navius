<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Navius Playground</title>
    <base href="/" />

    <!-- Pre-paint theme restore (classic script, before the stylesheet links) so a
         stored zits-theme is applied before first paint with no flash. -->
    <script src="_content/Zits.Ui/zits-theme-init.js"></script>

    <!--
      DEV-ONLY shortcut: Tailwind Play CDN so the playground looks right with zero
      build step, mapped to the zits/ui OKLCH token theme (served from the Zits.Ui
      class library as _content/Zits.Ui/zits-ui.css). A real project ships Tailwind v4
      via the standalone CLI / Tailwind.MSBuild (no Node), where the css `@theme` block
      wires the same tokens to utilities natively (including opacity modifiers).
    -->
    <link href="_content/Zits.Ui/zits-ui.css" rel="stylesheet" />
    <link href="_content/Zits.Ui/zits-theme.css" rel="stylesheet" />
    <link href="_content/Navius.Motion/navius-motion.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: 'var(--border)',
                        input: 'var(--input)',
                        ring: 'var(--ring)',
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
                        secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
                        destructive: { DEFAULT: 'var(--destructive)', foreground: 'var(--destructive-foreground)' },
                        muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
                        accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
                        popover: { DEFAULT: 'var(--popover)', foreground: 'var(--popover-foreground)' },
                        card: { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
                    },
                    borderRadius: {
                        lg: 'var(--radius)',
                        md: 'calc(var(--radius) - 2px)',
                        sm: 'calc(var(--radius) - 4px)',
                    },
                    fontFamily: {
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                },
            },
        };
    </script>
    <style>
        html, body { margin: 0; padding: 0; }
        kbd {
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0 4px;
            font-size: 0.75em;
        }
    </style>
</head>

<body>
    <div id="app">
        <div style="display:flex;height:100vh;align-items:center;justify-content:center;font-family:ui-monospace,monospace;color:#888">
            Loading Navius…
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;padding:0.75rem;background:#b91c1c;color:#fff;font-family:sans-serif">
        An unhandled error has occurred. <a href="" class="reload" style="color:#fff;text-decoration:underline">Reload</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
