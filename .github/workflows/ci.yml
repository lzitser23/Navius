name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: navius

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build packages in Release
        working-directory: navius
        run: |
          dotnet build src/Navius.Primitives/Navius.Primitives.csproj -c Release
          dotnet build src/Navius.Motion/Navius.Motion.csproj -c Release

      - name: Run unit tests
        working-directory: navius
        run: dotnet test tests/Navius.Motion.Tests/Navius.Motion.Tests.csproj -c Release

      - name: Pack NuGet artifacts
        working-directory: navius
        run: |
          dotnet pack src/Navius.Primitives/Navius.Primitives.csproj -c Release --no-build -o "${{ runner.temp }}/nupkgs"
          dotnet pack src/Navius.Motion/Navius.Motion.csproj -c Release --no-build -o "${{ runner.temp }}/nupkgs"

  e2e:
    runs-on: ubuntu-latest
    steps:
      # The playground references the styled helm in the sibling zits-helm repo
      # (ADR-0008), so this Playwright gate checks the sibling out next to this repo
      # to resolve the playground's ProjectReference before driving it. Pinned to the
      # helm's main, matching the publish-nuget consumer-build gate.
      - uses: actions/checkout@v4
        with:
          path: navius

      - uses: actions/checkout@v4
        with:
          repository: lzitser23/Zits-helm
          ref: main
          path: zits-helm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build playground
        working-directory: navius
        run: dotnet build playground/Navius.Playground/Navius.Playground.csproj -c Debug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install e2e deps
        working-directory: navius/tests/e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: navius/tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: navius/tests/e2e
        env:
          CI: 'true'
        run: npm test
