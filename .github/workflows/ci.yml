name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # The playground references the styled helm in the sibling zits-helm repo
      # (ADR-0008): both repos must be checked out side by side.
      - uses: actions/checkout@v4
        with:
          path: navius

      - uses: actions/checkout@v4
        with:
          repository: lzitser23/zits-helm
          path: zits-helm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build library + playground
        working-directory: navius
        run: dotnet build playground/Navius.Playground/Navius.Playground.csproj -c Debug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install e2e deps
        working-directory: navius/tests/e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: navius/tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: navius/tests/e2e
        env:
          CI: 'true'
        run: npm test
